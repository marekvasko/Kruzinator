services:
  kruzinator-vue-dev:
    build:
      context: kruzinator-vue
      dockerfile: Dockerfile.dev
    # ...
    develop:
      # Create a `watch` configuration to update the app
      #
      watch:
        # Sync the working directory with the `/app` directory in the container
        - action: sync
          path: kruzinator-vue/
          target: /app
          # Exclude the project dependencies from being synced
          ignore:
            - node_modules/

        # Rebuild the image on changes to the `package.json` or `package-lock.json` files
        - action: rebuild
          path: kruzinator-vue/package.json
    labels:
      - traefik.enable=true
      - traefik.http.routers.kruzinator-vue-dev.rule=Host(`dev.kruzinator.capturemyhand.com`)
      - traefik.http.routers.kruzinator-vue-dev.entrypoints=websecure
      - traefik.http.routers.kruzinator-vue-dev.tls.certresolver=tlschallenge
    networks:
      - web

  kruzinator-api-dev:
    build:
      context: kruzinator-api
      dockerfile: Dockerfile
      args:
        UV_NO_DEV: 0
        UV_COMPILE_BYTECODE: 1
    # ...
    depends_on:
      kruzinator-postgres:
        condition: service_healthy
    develop:
      # Create a `watch` configuration to update the app
      #
      watch:
        # Sync the working directory with the `/app` directory in the container
        - action: sync
          path: kruzinator-api/
          target: /app
          # Exclude the project virtual environment
          ignore:
            - kruzinator-api/.venv/

        # Rebuild the image on changes to the `pyproject.toml`
        - action: rebuild
          path: kruzinator-api/pyproject.toml
    labels:
      - traefik.enable=true
      - traefik.http.routers.kruzinator-api-dev.rule=Host(`dev.kruzinator.capturemyhand.com`) && (PathPrefix(`/api`) || PathPrefix(`/.well-known`) || Path(`/openapi.json`) || Path(`/docs`) || Path(`/redoc`))
      - traefik.http.routers.kruzinator-api-dev.entrypoints=websecure
      - traefik.http.routers.kruzinator-api-dev.tls.certresolver=tlschallenge
      - traefik.http.services.kruzinator-api-dev.loadbalancer.server.port=8000
    environment:
      - PORT=8000
      - SESSION_DATA_PATH=/data/sessions
    env_file: .env
    networks:
      - web
      - default

  kruzinator-postgres:
    image: postgres:18
    environment:
      - POSTGRES_DB=kruzinator
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./data/postgres:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kruzinator"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
  kruzinator-seaweedfs:
    image: "chrislusf/seaweedfs:4.15_large_disk"
    entrypoint: "weed"
    command: mini -dir=/data -ip=127.0.0.1 -ip.bind=0.0.0.0
    environment:
      AWS_ACCESS_KEY_ID: seaweedfs
      AWS_SECRET_ACCESS_KEY: seaweedfs
    labels:
      - traefik.enable=true
      
      - traefik.http.routers.kruzinator-seaweedfs-master.rule=Host(`seaweedfs-master.dev.kruzinator.capturemyhand.com`)
      - traefik.http.routers.kruzinator-seaweedfs-master.entrypoints=websecure
      - traefik.http.routers.kruzinator-seaweedfs-master.tls.certresolver=tlschallenge
      - traefik.http.services.kruzinator-seaweedfs-master.loadbalancer.server.port=9333

    #  - traefik.http.routers.kruzinator-seaweedfs-filer.rule=Host(`seaweedfs-filer.dev.kruzinator.capturemyhand.com`)
    #  - traefik.http.routers.kruzinator-seaweedfs-filer.entrypoints=websecure
    #  - traefik.http.routers.kruzinator-seaweedfs-filer.tls.certresolver=tlschallenge
    #  - traefik.http.services.kruzinator-seaweedfs-filer.loadbalancer.server.port=8888  
    #  - traefik.http.routers.kruzinator-seaweedfs-admin.rule=Host(`seaweedfs-admin.dev.kruzinator.capturemyhand.com`)
    #  - traefik.http.routers.kruzinator-seaweedfs-admin.entrypoints=websecure
    #  - traefik.http.routers.kruzinator-seaweedfs-admin.tls.certresolver=tlschallenge
    #  - traefik.http.services.kruzinator-seaweedfs-admin.loadbalancer.server.port=23646
    volumes:
      - ./data/seaweedfs:/data
    networks:
      - web
      - default

networks:
  web:
    external: true
      